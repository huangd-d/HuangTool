<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electron 文档应用</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      height: 100vh;
    }
    
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .header {
      background-color: #42b883;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    .sidebar {
      width: 200px;
      background-color: #f5f5f5;
      padding: 1rem;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }
    
    .sidebar ul {
      list-style: none;
      padding: 0;
    }
    
    .sidebar li {
      margin-bottom: 0.5rem;
    }
    
    .sidebar a {
      color: #333;
      text-decoration: none;
      display: block;
      padding: 0.5rem;
      border-radius: 4px;
    }
    
    .sidebar a:hover {
      background-color: #e0e0e0;
    }
    
    .content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Electron 文档应用</h1>
    </header>
    <main class="main">
      <nav class="sidebar">
        <ul id="docs-list">
          <li>加载中...</li>
        </ul>
      </nav>
      <div class="content">
        <h2>欢迎使用</h2>
        <p>这是一个基于 Electron 的本地文档访问应用</p>
        <p>请从左侧选择文档目录</p>
      </div>
    </main>
  </div>
  
  <script>
    async function loadDocsDirectories() {
      const docsList = document.getElementById('docs-list');
      
      try {
        const directories = await window.electronAPI.getDocsDirectories();
        
        if (directories.length === 0) {
          docsList.innerHTML = '<li>暂无文档目录</li>';
          return;
        }
        
        docsList.innerHTML = directories.map(dir => `
          <li>
            <a href="doc://${dir}">${dir.charAt(0).toUpperCase() + dir.slice(1)} 文档</a>
          </li>
        `).join('');
      } catch (error) {
        console.error('Error loading docs directories:', error);
        docsList.innerHTML = '<li>获取文档目录失败</li>';
      }
    }
    
    window.addEventListener('DOMContentLoaded', loadDocsDirectories);
  </script>
</body>
</html>
